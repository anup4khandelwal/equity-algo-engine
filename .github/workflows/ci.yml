name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------------
  # Secret scanning — runs first and fast. Blocks the pipeline if any key,
  # token, or credential is found in the diff or history.
  # ----------------------------------------------------------------------
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so gitleaks can scan past commits
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ----------------------------------------------------------------------
  # Lint + format check.
  # ----------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .

  # ----------------------------------------------------------------------
  # Tests against a real TimescaleDB + Redis. All Kite/broker calls are
  # mocked in the test suite — no live API access in CI.
  # ----------------------------------------------------------------------
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: [lint, secret-scan]

    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: algo
          POSTGRES_PASSWORD: algo
          POSTGRES_DB: algo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U algo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Test-only connection strings; real credentials never live in CI.
      DATABASE_URL: postgresql+psycopg://algo:algo@localhost:5432/algo_test
      REDIS_URL: redis://localhost:6379/0
      # Dummy values so pydantic-settings validates; broker calls are mocked.
      KITE_API_KEY: test-key
      KITE_API_SECRET: test-secret
      TRADING_MODE: paper

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run migrations
        run: uv run alembic upgrade head
      - name: Run tests
        run: uv run pytest -v --maxfail=1
