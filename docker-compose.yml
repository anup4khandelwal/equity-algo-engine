# Stateful services only. The Python engine runs on the host for fast
# iteration. Bring these up with: docker compose up -d
services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: algo-timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-algo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-algo}
      POSTGRES_DB: ${POSTGRES_DB:-algo}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-algo} -d ${POSTGRES_DB:-algo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: algo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  timescale_data:
  redis_data:
